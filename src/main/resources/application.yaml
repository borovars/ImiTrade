spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/imitrade
    username: imitrade
    password: imitrade
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
