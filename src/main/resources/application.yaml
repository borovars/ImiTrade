spring:
  application:
    name: imitrade

  datasource:
    url: jdbc:postgresql://localhost:5432/imitrade
    username: imitrade
    password: imitrade
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

# ============================================================================
# Application configuration
# ============================================================================
app:
  security:
    jwt:
      # MUST be overridden in production via environment variable / external config
      secret-key: ${APP_JWT_SECRET:YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkw}
      # Access token lifetime in milliseconds (default = 24h)
      access-token-ttl: ${APP_JWT_TTL:86400000}
      issuer: imitrade

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8080
